[monitor]
interval_seconds = 60
timeout_seconds = 10
retry_attempts = 3

[thresholds]
response_time_ms = 2000
consecutive_failures = 2

[aws]
region = us-east-2
sns_topic_arn = arn:aws:sns:us-east-2:522822657254:cloud-telemetry-alerts

[logging]
log_level = INFO
log_file = logs/uptime.log

[reporting]
report_output = logs/report.json